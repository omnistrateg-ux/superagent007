# MOEX Agent v2 Configuration

app:
  poll_seconds: 5
  cooldown_minutes: 30
  top_n_anomalies: 10
  max_workers: 20
  fee_bps: 8.0

storage:
  sqlite_path: "data/moex_agent.sqlite"

universe:
  engine: "stock"
  market: "shares"
  board: "TQBR"
  # Top 40 by daily turnover (>50M RUB)
  tickers:
    - SBER
    - GAZP
    - LKOH
    - ROSN
    - NVTK
    - VTBR
    - TATN
    - GMKN
    - RUAL
    - PLZL
    - ALRS
    - YDEX
    - SIBN
    - RNFT
    - FLOT
    - BAZA
    - IVAT
    - OZON
    - ASTR
    - POSI
    - MAGN
    - CHMF
    - NLMK
    - AFLT
    - MTSS
    - MOEX
    - VKCO
    - WUSH
    - SMLT
    - IRAO
    - MGNT
    - TATNP
    - BANEP
    - RTKM
    - SELG
    - UGLD
    - HYDR
    - SPBE
    - LENT
    - ENPG

signals:
  horizons:
    - { name: "5m", minutes: 5 }
    - { name: "10m", minutes: 10 }
    - { name: "30m", minutes: 30 }
    - { name: "1h", minutes: 60 }
    - { name: "1d", minutes: 1440 }
    # 1w excluded - negative Sharpe
  p_threshold: 0.51
  cooldown_minutes: 30
  top_n_anomalies: 10
  price_exit:
    enabled: true
    take_atr: 0.8
    stop_atr: 0.6

risk:
  max_spread_bps: 200
  min_turnover_rub_5m: 1000000
  max_loss_per_trade_pct: 0.5
  max_daily_loss_pct: 2.0
  max_consecutive_losses: 2
  max_drawdown_pct: 10.0

telegram:
  enabled: false
  # bot_token: from .env TELEGRAM_BOT_TOKEN
  # chat_id: from .env TELEGRAM_CHAT_ID
  send_recommendations:
    - STRONG_BUY
    - BUY
    - STRONG_SELL
    - SELL
